[tool.pytest.ini_options]
markers = [
    "requires_torch: tests that need real torch/numpy/speechbrain installed",
    "requires_db: tests that need a real Postgres connection (not available in CI)",
]

[tool.ruff]
line-length = 120
target-version = "py312"
exclude = ["venv", ".git", "__pycache__", "backup"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line too long — many existing long lines
    "E402",  # module-level import not at top (lazy imports in tasks/conftest)
    "F401",  # unused imports — some are intentional in __init__ files
    "F811",  # redefinition — conftest patches
]
