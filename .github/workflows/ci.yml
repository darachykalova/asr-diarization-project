name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # Job 1: Lint — fast check, no heavy deps needed
  # -------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  # -------------------------------------------------------------------
  # Job 2: Tests — ML models are mocked, no Docker needed
  # -------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    env:
      # Non-sensitive config — stored as GitHub Variables (Settings → Variables)
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      SPEAKER_MATCH_THRESHOLD: ${{ vars.SPEAKER_MATCH_THRESHOLD }}
      MINIO_BUCKET: ${{ vars.MINIO_BUCKET }}
      MINIO_MODELS_BUCKET: ${{ vars.MINIO_MODELS_BUCKET }}

      # Sensitive config — stored as GitHub Secrets (Settings → Secrets)
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # Fixed values — no real services are used in tests (startup is mocked)
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379/0
      REDIS_BACKEND_URL: redis://localhost:6379/1
      QDRANT_HOST: localhost
      QDRANT_PORT: "6333"
      MINIO_ENDPOINT: localhost:9000
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run tests
        run: pytest tests/ -v -m "not requires_torch"
