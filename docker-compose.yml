services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_BACKEND_URL: redis://redis:6379/1
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - qdrant
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_BACKEND_URL: redis://redis:6379/1
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - qdrant
    command: python -m celery -A tasks worker --loglevel=info --pool=solo

volumes:
  qdrant_data: