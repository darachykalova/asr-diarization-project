services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - asr-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - asr-net

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - asr-net

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asr-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - asr-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: asr-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HF_HOME: /app/models/hf
      MODEL_CACHE_DIR: /app/models
      # Models are pre-downloaded into the image/volume — never hit the network
      # at runtime (faster, robust, satisfies ТЗ offline requirement).
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      # Must match the worker: the upload route picks chain vs monolith from this.
      PIPELINE_MODE: "chain"
    volumes:
      - ./data:/app/data
      - models_cache:/app/models
      - ./models_backup:/app/models_backup:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -c "python scripts/sync_models_from_minio.py &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000"
    networks:
      - asr-net

  worker:
    image: asr-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HF_HOME: /app/models/hf
      MODEL_CACHE_DIR: /app/models
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      MINIO_MODELS_BUCKET: "ml-models"
      PIPELINE_MODE: "chain"
    mem_limit: 5g
    volumes:
      - ./data:/app/data
      - models_cache:/app/models
      - ./models_backup:/app/models_backup:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      sh -c "python scripts/sync_models_from_minio.py &&
             python scripts/verify_models.py &&
             python -m celery -A tasks.audio_tasks worker --loglevel=info --pool=prefork --concurrency=2 --max-tasks-per-child=10"
    networks:
      - asr-net

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["backup"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-files}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    volumes:
      - backup_data:/backups
    depends_on:
      - postgres
      - qdrant
      - minio
    networks:
      - asr-net

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - asr-net

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - asr-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""   # пусто = тот же хост через nginx proxy
        VITE_CALL_AGENT_WS: "ws://localhost:8100/ws/call"  # dev; prod: route via nginx wss
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api
    networks:
      - asr-net

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - asr-net

  call-agent:
    # Models required: download vosk-model-small-ru into models_cache volume
    # and Silero v4_ru.pt. Run: docker compose exec call-agent python scripts/verify_call_agent_models.py
    #
    # Quick setup:
    #   wget https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip
    #   unzip vosk-model-small-ru-0.22.zip
    #   docker cp vosk-model-small-ru-0.22 call-agent:/app/models/vosk/
    #   docker compose exec call-agent python -c "import torch; torch.hub.download_url_to_file(
    #     'https://models.silero.ai/models/tts/ru/v4_ru.pt', '/app/models/silero/v4_ru.pt')"
    build:
      context: .
      dockerfile: call_agent/Dockerfile
    image: asr-call-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODEL_CACHE_DIR: /app/models
      HF_HUB_OFFLINE: "1"
      OLLAMA_URL: "http://ollama:11434"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:4000"
    volumes:
      - ./data:/app/data
      - models_cache:/app/models
    ports:
      - "${CALL_AGENT_PORT:-8100}:8100"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - asr-net

networks:
  asr-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  models_cache:
  prometheus_data:
  grafana_data:
  backup_data:
  ollama_data:
